name: rust

# The automated regression gate for the Rust workspace AND the in-DB safety floor
# (issue #117). Before this, the only CI was the docs build + CodeQL, so the §9
# safety-critical surface — the validated `submit_event`/`apply_remote_*` doors, the
# identity algebra, HLC ordering, the demographic/match projections — had NO automated
# gate: the DB-gated integration suites ran only on a hand-built local rig. This job
# stands that rig up in CI: a real PostgreSQL with the `cairn_pgx` (pgrx) extension
# installed, then `cargo clippy` + `cargo test --workspace` with `CAIRN_TEST_PG` set so
# the DB-gated tests actually execute (they self-skip when it is unset).
#
# The same job also runs the advisory Python matcher's DB-gated integration suite
# (issue #145): its tests self-skip without CAIRN_TEST_PG, so they too ran nowhere in CI.
# They need the identical PG + cairn_pgx rig, and the extension compile dominates wall
# time — so we run them here against the cluster this job already built rather than stand
# up (and rebuild the extension for) a second rig in matcher.yml. The matcher conftest
# applies the db/*.sql schema itself, so it needs only the cluster + extension.

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels the superseded run (the DB rig is expensive).
concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Formatting gate — fast, no Postgres. Enforces rustfmt defaults across BOTH cargo trees
  # (the workspace and the separate cairn_pgx extension). poc/ frozen spikes are not members
  # of either, so they are deliberately left untouched.
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      # The repo pins its toolchain in rust-toolchain.toml (#144): an exact channel plus the
      # rustfmt/clippy components. rustup installs that toolchain on first use; `rustup show`
      # forces it now so a toolchain problem surfaces here rather than mid-format. This is why
      # the old `rustup component add rustfmt` step is gone — the toolchain file is the single
      # source of truth for BOTH the channel and the components (the whole point of pinning:
      # the fmt gate can no longer drift when the runner's default stable moves).
      - name: Install the pinned toolchain (+ rustfmt/clippy)
        run: rustup show
      - name: rustfmt (workspace)
        run: cargo fmt --all --check
      - name: rustfmt (cairn_pgx extension)
        run: cargo fmt --check --manifest-path extensions/cairn_pgx/Cargo.toml

  # Supply-chain gate — fast, no Postgres. Enforces the AGPL-compatible license allow-list,
  # RUSTSEC advisories, wildcard/source bans (deny.toml). Runs on BOTH trees; the extension
  # tree shares the root deny.toml. cargo-deny is cached like cargo-pgrx below.
  deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Cache the cargo-deny binary
        id: deny-bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          # Pin the version in BOTH the key and the install below: `--locked` only pins
          # cargo-deny's own deps, not cargo-deny itself, so an unpinned `cargo install`
          # would silently track latest and could redefine "clean" out from under us — the
          # exact drift we pin ruff against on the Python side. Bump key + version together.
          key: cargo-deny-0.19.9-${{ runner.os }}
      - name: Install cargo-deny
        if: steps.deny-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --version 0.19.9 --locked
      - name: cargo-deny (workspace)
        run: cargo deny check
      - name: cargo-deny (cairn_pgx extension)
        run: cargo deny --manifest-path extensions/cairn_pgx/Cargo.toml check --config deny.toml

  test:
    # This job's name is a REQUIRED status check in main's branch protection, and GitHub
    # matches required checks by exact name. Keep it PG-version-INDEPENDENT: encoding the
    # PG major here (the old "(PG16 …)") means every version bump renames the check and
    # orphans the required one, silently blocking every PR on a check that never reports
    # (exactly what happened bumping 16->18, #144). The PG major lives in env below, not here.
    name: clippy + cargo test (cairn_pgx floor)
    # Pinned (not ubuntu-latest): the apt PostgreSQL major and the clang/llvm major
    # this job depends on are properties of the image, so pin the image that was
    # validated rather than let a silent bump surprise the floor gate.
    runs-on: ubuntu-24.04
    env:
      # PostgreSQL major. The spec targets >= 18 and cairn_pgx defaults to its `pg18`
      # feature (pgrx 0.18.1), so the gate must exercise 18 — testing 16 while we ship 18
      # would let a PG18-only regression land green (#144). Ubuntu 24.04 does not ship 18
      # in its default repos, so the job adds the PGDG apt repo (apt.postgresql.org) in a
      # step below before installing postgresql-18 + postgresql-server-dev-18.
      PG_MAJOR: "18"
      # MUST match the pgrx pin in extensions/cairn_pgx/Cargo.toml (`pgrx = "=0.18.1"`).
      # A drift here builds an extension ABI-mismatched with the crate under test.
      PGRX_VERSION: "0.18.1"
      # A throwaway port, away from any PostgreSQL the runner image pre-starts on 5432.
      PGPORT: "54329"
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v6

      # ---- PGDG apt repository: PostgreSQL 18 is not in Ubuntu 24.04's default repos ----
      # apt.postgresql.org (the official PostgreSQL Global Development Group repo) carries
      # every current major for the runner's Ubuntu codename (noble). We add its signing key
      # to a dedicated keyring and register the repo with `signed-by=` (the modern, per-repo
      # trust model — never the deprecated apt-key global keyring). The install step's own
      # `apt-get update` then refreshes the index with PG18 available.
      - name: Add the PGDG apt repository
        run: |
          set -euxo pipefail
          sudo install -d /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/keyrings/pgdg.gpg
          echo "deb [signed-by=/etc/apt/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list

      # ---- system prerequisites: PostgreSQL + its server headers + libclang --------
      # postgresql-server-dev-N supplies pg_config and the server headers pgrx's
      # bindgen step needs; clang/libclang-dev supply the libclang bindgen links against
      # (without it the pgrx-pg-sys build fails with "bindgen failed"). `apt-get update`
      # first (now with PGDG registered): the index can lag the current point release,
      # 404-ing a pinned-version fetch otherwise.
      - name: Install PostgreSQL ${{ env.PG_MAJOR }} + build prerequisites
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            "postgresql-${PG_MAJOR}" "postgresql-server-dev-${PG_MAJOR}" \
            clang libclang-dev build-essential
          # Pin the exact pg_config for this major (avoid the multi-version dispatcher
          # at /usr/bin/pg_config picking a different cluster).
          echo "PG_CONFIG=/usr/lib/postgresql/${PG_MAJOR}/bin/pg_config" >> "$GITHUB_ENV"
          echo "/usr/lib/postgresql/${PG_MAJOR}/bin" >> "$GITHUB_PATH"
          # Point bindgen at libclang explicitly (robust to the llvm major on the image).
          echo "LIBCLANG_PATH=$(ls -d /usr/lib/llvm-*/lib | tail -1)" >> "$GITHUB_ENV"

      # Install the pinned toolchain (rust-toolchain.toml, #144) and its clippy/rustfmt
      # components explicitly, before the expensive extension build, so a toolchain problem
      # fails fast. Replaces the old `rustup component add clippy` — the toolchain file is now
      # the single source of truth for the channel and components.
      - name: Install the pinned toolchain (+ clippy)
        run: rustup show

      # ---- caches: the extension compile dominates wall time (issue #117 note) ------
      - name: Cache cargo registry + build (workspace and extension)
        uses: Swatinem/rust-cache@v2
        with:
          # The extension is a SEPARATE cargo workspace (root Cargo.toml excludes it),
          # with its own Cargo.lock and target dir — cache both trees.
          workspaces: |
            . -> target
            extensions/cairn_pgx -> target

      - name: Cache the cargo-pgrx binary
        id: pgrx-bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ env.PGRX_VERSION }}-${{ runner.os }}

      - name: Install cargo-pgrx (${{ env.PGRX_VERSION }})
        if: steps.pgrx-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version "=${PGRX_VERSION}" --locked

      # `init` registers the system pg_config with pgrx; cheap, so it always runs (even
      # on a cache hit for the binary). It writes ~/.pgrx/config.toml.
      - name: Initialize pgrx against the system PostgreSQL
        run: cargo pgrx init "--pg${PG_MAJOR}" "$PG_CONFIG"

      # `cargo pgrx install` copies the built .so + control + SQL into pg_config's
      # pkglibdir / sharedir, which are root-owned. Make just those two dirs writable so
      # the install runs as the (unprivileged) runner user — building the crate under
      # sudo would write root-owned artifacts into the cargo cache.
      - name: Build + install cairn_pgx into the system PostgreSQL
        run: |
          set -euxo pipefail
          sudo chmod a+w "$("$PG_CONFIG" --pkglibdir)" "$("$PG_CONFIG" --sharedir)/extension"
          cd extensions/cairn_pgx
          cargo pgrx install \
            --no-default-features --features "pg${PG_MAJOR}" \
            --pg-config "$PG_CONFIG"

      # A throwaway cluster owned by the runner user, on a private port, with the
      # extension created in the test database. trust auth is fine — it is bound to
      # 127.0.0.1 on an ephemeral CI VM.
      - name: Start PostgreSQL and create the test database
        run: |
          set -euxo pipefail
          export PGDATA="$RUNNER_TEMP/pgdata"
          initdb -D "$PGDATA" -U postgres --auth=trust
          # unix_socket_directories defaults to /var/run/postgresql, which the
          # unprivileged runner user cannot write (Permission denied on the socket lock
          # file). Point it at the runner-owned data dir; the tests connect over TCP
          # (127.0.0.1) regardless, so the socket path only needs to be writable.
          pg_ctl -D "$PGDATA" \
            -o "-p ${PGPORT} -c listen_addresses=127.0.0.1 -c unix_socket_directories=$PGDATA" \
            -l "$PGDATA/server.log" start
          for _ in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p "${PGPORT}" -U postgres && break
            sleep 1
          done
          # Three databases on the one cluster: cairn_test is every single-node
          # suite; cairn_test2/cairn_test3 are nodes B and C for the multi-node
          # sync-convergence suites (federation.rs, sync_watermark.rs, the
          # cairn-sync clinical A→B pull) — without them those tests self-skip
          # and the flagship set-union guarantee is never checked in CI (#199).
          for db in cairn_test cairn_test2 cairn_test3; do
            createdb -h 127.0.0.1 -p "${PGPORT}" -U postgres "$db"
            psql -h 127.0.0.1 -p "${PGPORT}" -U postgres -d "$db" \
              -c "CREATE EXTENSION cairn_pgx;"
          done
          psql -h 127.0.0.1 -p "${PGPORT}" -U postgres -d cairn_test \
            -tAc "SELECT 'cairn_pgx ' || extversion FROM pg_extension WHERE extname='cairn_pgx';"

      # Warnings are errors: the house style keeps the safety surface clippy-clean.
      - name: clippy (workspace, tests)
        run: cargo clippy --workspace --tests -- -D warnings

      # The DB-gated integration suites self-serialize cluster-wide via a Postgres
      # advisory lock (db::test_serial_guard), so the default parallel run is reliable.
      # PG2/PG3 are nodes B and C for the multi-node convergence suites (#199): with
      # all three set, NO Rust test self-skips — CI runs exactly what a fully-rigged
      # local checkout runs.
      - name: cargo test (workspace, in-DB floor)
        env:
          CAIRN_TEST_PG: host=127.0.0.1 port=${{ env.PGPORT }} user=postgres dbname=cairn_test
          CAIRN_TEST_PG2: host=127.0.0.1 port=${{ env.PGPORT }} user=postgres dbname=cairn_test2
          CAIRN_TEST_PG3: host=127.0.0.1 port=${{ env.PGPORT }} user=postgres dbname=cairn_test3
        run: cargo test --workspace

      # ---- matcher DB-gated integration suite (#145) --------------------------------
      # Runs AFTER the Rust floor tests, against the same cluster + extension. uv is the
      # project's mandated Python tool (never venv/pip); the `pipeline` extra pulls psycopg
      # so the gated tests can connect. With CAIRN_TEST_PG set, none of them self-skip — the
      # full matcher suite (pure + DB-gated) runs, which is exactly how it is run locally.
      - name: Install uv (for the matcher DB suite)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: matcher/uv.lock
      - name: pytest (matcher DB-gated integration suite)
        working-directory: matcher
        env:
          CAIRN_TEST_PG: host=127.0.0.1 port=${{ env.PGPORT }} user=postgres dbname=cairn_test
        run: uv run --extra pipeline pytest -q

      # If anything above failed, the server log is the first thing a human wants.
      - name: PostgreSQL log (on failure)
        if: failure()
        run: cat "$RUNNER_TEMP/pgdata/server.log" || true
