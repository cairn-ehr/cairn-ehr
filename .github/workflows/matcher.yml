name: matcher

# CI gate for the advisory Python matcher (matcher/). Before this the entire advisory tier had
# NO automated gate — ruff + pytest ran only when a developer remembered, so it could rot
# silently while the Rust side stayed green. Fast (no database): runs ruff lint + the pure
# pytest suite. The DB-gated integration tests self-skip here (no CAIRN_TEST_PG); they run in
# the `rust` workflow's floor job instead (issue #145), against the PG + cairn_pgx cluster that
# job already stands up — so we don't build the expensive extension a second time here.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: matcher-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: ruff + pytest
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: matcher
    steps:
      - uses: actions/checkout@v6

      # uv is the project's mandated Python tool (never venv/pip). setup-uv provisions uv and
      # the Python interpreter uv resolves from `requires-python`, and caches the uv store.
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: matcher/uv.lock

      - name: ruff (lint — the pinned rule set in pyproject.toml)
        run: uv run ruff check .

      - name: pytest (pure suite; DB-gated tests self-skip without CAIRN_TEST_PG)
        run: uv run pytest -q
